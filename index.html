<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My GitHub Page</title>

<style>
    body {
        font-family: Arial, sans-serif;
        margin: 0;
        background: #f5f5f5;
    }
    .container {
        max-width: 900px;   /* 控制网页宽度 */
        margin: 40px auto;  /* 上下间距 + 居中 */
        background: white;
        padding: 30px;
        border-radius: 12px;
        box-shadow: 0 4px 16px rgba(0,0,0,0.1);
    }
    h1 {
        text-align: center;
        margin-bottom: 20px;
    }
</style>
</head>

<body>

<div class="container">
    <h1>Welcome to My GitHub Page</h1>
    <p>This is a clean, centered layout with a fixed width.</p>
    <p>You can add anything you like here!</p>
</div>

</body>
</html>
